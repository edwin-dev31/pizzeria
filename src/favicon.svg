<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1200"/>
      <stop offset="100%" stop-color="#0e0b09"/>
    </radialGradient>

    <!-- Pizza dough -->
    <radialGradient id="crust" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a84a"/>
      <stop offset="75%" stop-color="#c97c1e"/>
      <stop offset="100%" stop-color="#8b4a0a"/>
    </radialGradient>

    <!-- Sauce -->
    <radialGradient id="sauce" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </radialGradient>

    <!-- Cheese -->
    <radialGradient id="cheese" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </radialGradient>

    <!-- Fire glow -->
    <radialGradient id="fireBase" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#ff6a00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Fire glow behind pizza -->
  <ellipse cx="32" cy="48" rx="24" ry="10" fill="url(#fireBase)"/>

  <!-- ── Flames ── -->
  <g filter="url(#glow)">
    <!-- Far left -->
    <path d="M10 50 Q8 42 11 36 Q10 41 14 39 Q11 44 12 50Z" fill="#ff4500" opacity="0.85"/>
    <path d="M12 50 Q11 43 15 38 Q13 42 17 40 Q14 45 14 50Z" fill="#ff6a00"/>
    <!-- Left -->
    <path d="M16 50 Q14 40 18 33 Q16 39 21 36 Q17 43 18 50Z" fill="#ff4500" opacity="0.9"/>
    <path d="M18 50 Q17 41 22 35 Q19 40 24 37 Q20 44 20 50Z" fill="#ff6a00"/>
    <path d="M20 50 Q19 43 23 37 Q21 41 25 39 Q22 45 22 50Z" fill="#ffb800" opacity="0.8"/>
    <!-- Center (tallest) -->
    <path d="M26 50 Q24 36 29 27 Q27 36 33 31 Q28 40 29 50Z" fill="#ff4500"/>
    <path d="M29 50 Q28 37 33 28 Q31 37 36 33 Q32 42 31 50Z" fill="#ff6a00"/>
    <path d="M31 50 Q30 38 35 30 Q33 38 37 34 Q34 43 33 50Z" fill="#ffb800" opacity="0.9"/>
    <!-- Right -->
    <path d="M36 50 Q35 41 39 35 Q37 40 42 37 Q38 44 38 50Z" fill="#ff4500" opacity="0.9"/>
    <path d="M38 50 Q37 42 41 36 Q39 41 43 39 Q40 45 40 50Z" fill="#ff6a00"/>
    <path d="M40 50 Q39 43 43 38 Q41 42 45 40 Q42 46 42 50Z" fill="#ffb800" opacity="0.8"/>
    <!-- Far right -->
    <path d="M44 50 Q43 42 47 37 Q45 41 49 39 Q46 45 46 50Z" fill="#ff4500" opacity="0.85"/>
    <path d="M46 50 Q45 43 49 38 Q47 42 51 40 Q48 45 48 50Z" fill="#ff6a00"/>
  </g>

  <!-- Fire base line -->
  <ellipse cx="32" cy="50" rx="20" ry="2" fill="#ff6a00" opacity="0.9"/>
  <ellipse cx="32" cy="50" rx="14" ry="1.2" fill="#ffb800" opacity="0.95"/>

  <!-- ── Pizza ── -->
  <!-- Crust (full circle) -->
  <circle cx="32" cy="28" r="18" fill="url(#crust)"/>
  <!-- Crust ring shadow -->
  <circle cx="32" cy="28" r="18" fill="none" stroke="#7a3a08" stroke-width="1.5" opacity="0.6"/>

  <!-- Sauce layer -->
  <circle cx="32" cy="28" r="15" fill="url(#sauce)"/>

  <!-- Cheese layer -->
  <circle cx="32" cy="28" r="14" fill="url(#cheese)" opacity="0.9"/>

  <!-- Cheese blobs (melted look) -->
  <ellipse cx="28" cy="24" rx="5" ry="4" fill="#f5d76e" opacity="0.7"/>
  <ellipse cx="36" cy="26" rx="4" ry="3.5" fill="#f5d76e" opacity="0.65"/>
  <ellipse cx="30" cy="32" rx="4.5" ry="3" fill="#f5d76e" opacity="0.7"/>
  <ellipse cx="37" cy="32" rx="3" ry="2.5" fill="#f5d76e" opacity="0.6"/>

  <!-- Slice lines -->
  <line x1="32" y1="10" x2="32" y2="46" stroke="#8b4a0a" stroke-width="0.8" opacity="0.5"/>
  <line x1="16.4" y1="19" x2="47.6" y2="37" stroke="#8b4a0a" stroke-width="0.8" opacity="0.5"/>
  <line x1="16.4" y1="37" x2="47.6" y2="19" stroke="#8b4a0a" stroke-width="0.8" opacity="0.5"/>

  <!-- Pepperoni toppings -->
  <circle cx="32" cy="22" r="2.8" fill="#8b1a1a"/>
  <circle cx="32" cy="22" r="2.8" fill="none" stroke="#6b1010" stroke-width="0.4"/>
  <circle cx="32" cy="22" r="1" fill="#a02020" opacity="0.5"/>

  <circle cx="25" cy="29" r="2.5" fill="#8b1a1a"/>
  <circle cx="25" cy="29" r="2.5" fill="none" stroke="#6b1010" stroke-width="0.4"/>
  <circle cx="25" cy="29" r="0.9" fill="#a02020" opacity="0.5"/>

  <circle cx="39" cy="29" r="2.5" fill="#8b1a1a"/>
  <circle cx="39" cy="29" r="2.5" fill="none" stroke="#6b1010" stroke-width="0.4"/>
  <circle cx="39" cy="29" r="0.9" fill="#a02020" opacity="0.5"/>

  <circle cx="29" cy="35" r="2.2" fill="#8b1a1a"/>
  <circle cx="29" cy="35" r="2.2" fill="none" stroke="#6b1010" stroke-width="0.4"/>

  <circle cx="36" cy="22" r="1.8" fill="#8b1a1a"/>
  <circle cx="36" cy="22" r="1.8" fill="none" stroke="#6b1010" stroke-width="0.3"/>

  <!-- Crust highlight -->
  <path d="M18 18 Q32 10 46 18" fill="none" stroke="rgba(255,220,150,0.35)" stroke-width="2" stroke-linecap="round"/>
</svg>
