@if (hasAvailableProducts()) {
  <section class="menu-section" [attr.aria-labelledby]="'section-' + section().id">
    <header class="menu-section__header">
      <h2
        class="menu-section__title"
        [id]="'section-' + section().id"
      >
        {{ section().name }}
      </h2>
      <span class="menu-section__count">
        {{ availableProducts().length }} {{ availableProducts().length === 1 ? 'producto' : 'productos' }}
      </span>
    </header>

    <div class="menu-section__grid">
      @for (product of availableProducts(); track product.id) {
        <app-product-card [product]="product" />
      }
    </div>
  </section>
}
