<article
  class="product-card"
  role="button"
  tabindex="0"
  (click)="select()"
  (keydown.enter)="select()"
  (keydown.space)="select()"
  [attr.aria-label]="'Ver detalle de ' + product().name"
>
  <div class="product-card__image-wrap">
    <app-image-carousel [images]="product().images ?? []" />
    <span class="product-card__price-badge">
      @if (hasVariants()) {
        {{ displayPrice() | currencyFormat: currencySymbol }}
      } @else {
        {{ product().price | currencyFormat: currencySymbol }}
      }
    </span>
    @if (cartQuantity() > 0) {
      <span class="product-card__qty-badge" [attr.aria-label]="cartQuantity() + ' en carrito'">
        {{ cartQuantity() }}
      </span>
    }
  </div>

  <div class="product-card__body">
    <h3 class="product-card__name">{{ product().name }}</h3>
    @if (product().description) {
      <p class="product-card__description">{{ product().description }}</p>
    }
    <div class="product-card__footer">
      <span class="product-card__cta" aria-hidden="true">Ver detalle →</span>
    </div>
  </div>
</article>
