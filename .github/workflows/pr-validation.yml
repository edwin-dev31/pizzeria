name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Angular Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate environment files
        run: node scripts/generate-env.mjs

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate environment files
        run: node scripts/generate-env.mjs

      - name: Type check
        run: npx tsc --noEmit

  docker-smoke:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate environment files
        run: node scripts/generate-env.mjs

      - name: Build Docker image
        run: docker build -t pizzeria-platform:pr-${{ github.event.pull_request.number }} .

      - name: Start container
        run: |
          docker run -d \
            --name pizzeria-test \
            -p 8080:80 \
            -e SUPABASE_URL=https://placeholder.supabase.co \
            -e SUPABASE_ANON_KEY=placeholder_anon_key \
            -e CLOUDINARY_CLOUD_NAME=placeholder \
            -e CLOUDINARY_UPLOAD_PRESET=placeholder \
            pizzeria-platform:pr-${{ github.event.pull_request.number }}

      - name: Wait for container to be ready
        run: |
          echo "Waiting for nginx..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "✅ Container is up"
              exit 0
            fi
            echo "Attempt $i/15 — retrying in 2s..."
            sleep 2
          done
          echo "❌ Container did not respond in time"
          docker logs pizzeria-test
          exit 1

      - name: Check HTTP response
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Expected 200, got $STATUS"
            docker logs pizzeria-test
            exit 1
          fi
          echo "✅ HTTP 200 OK"

      - name: Check index.html is served
        run: |
          BODY=$(curl -sf http://localhost:8080)
          if echo "$BODY" | grep -q "app-root"; then
            echo "✅ Angular app-root found in response"
          else
            echo "❌ app-root not found — build may be broken"
            exit 1
          fi

      - name: Check placeholders were replaced
        run: |
          JS_FILES=$(docker exec pizzeria-test find /usr/share/nginx/html -name "*.js" | head -5)
          for f in $JS_FILES; do
            if docker exec pizzeria-test grep -q "__SUPABASE_URL__" "$f" 2>/dev/null; then
              echo "❌ Placeholder __SUPABASE_URL__ was NOT replaced in $f"
              exit 1
            fi
          done
          echo "✅ All placeholders replaced"

      - name: Stop container
        if: always()
        run: docker rm -f pizzeria-test || true

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on entrypoint
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning
